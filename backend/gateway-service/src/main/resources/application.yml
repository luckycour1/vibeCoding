server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    # ========== gateway配置 ==========
    gateway:
      discovery:
        locator:
          enabled: false
      # 不要设置 default-filters、AddResponseHeader、CORS 相关配置，全部交给 CorsConfig.java 统一处理
      routes:
        - id: user-service
          uri: http://127.0.0.1:8081  # Docker容器内使用服务名，宿主机开发可改为 localhost:8081
          predicates:
            - Path=/api/user/**,/api/role/**,/api/department/**,/api/permission/**
          filters:
            - StripPrefix=1
      httpclient:
        connect-timeout: 5000
        response-timeout: 10000
# JWT配置
jwt:
  secret: vibecoding-secret-key-for-jwt-token-generation
  expiration: 7200000

# 自定义错误响应
spring.codec:
  max-in-memory-size: 1MB

# CORS配置已在CorsConfig.java中配置

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  health:
    defaults:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.vibecoding: DEBUG
    reactor.netty: INFO
