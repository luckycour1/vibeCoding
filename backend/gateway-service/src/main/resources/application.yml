server:
  port: 8080

spring:
  config:
    import: optional:nacos:${spring.application.name}.yaml
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
        namespace: dev
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1

jwt:
  secret: vibecoding-secret-key-for-jwt-token-generation

logging:
  file:
    name: /logs/gateway-service.log
  level:
    org.springframework.cloud.gateway: DEBUG
    com.vibecoding: DEBUG
