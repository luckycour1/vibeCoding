server:
  port: 8080

spring:
  config:
    import: optional:nacos:${spring.application.name}.yaml
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR:nacos:8848}
        namespace: dev
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1

jwt:
  secret: ${JWT_SECRET:vibecoding-secret-key-for-jwt-token-generation}

logging:
  file:
    name: ${LOGGING_FILE_NAME:/logs/gateway-service.log}
  level:
    org.springframework.cloud.gateway: DEBUG
    com.vibecoding: DEBUG
