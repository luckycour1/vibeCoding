server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    # ========== gateway配置 ==========
    gateway:
      discovery:
        locator:
          enabled: false
      # 默认过滤器 - 设置响应头
      # default-filters:
      #   - AddRequestHeader=X-Forwarded-For, ${remoteAddr}
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
      # 路由失败时返回JSON错误
      httpclient:
        connect-timeout: 5000
        response-timeout: 10000

# 自定义错误响应
spring.codec:
  max-in-memory-size: 1MB

# CORS配置已在CorsConfig.java中配置

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  health:
    defaults:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.vibecoding: DEBUG
    reactor.netty: INFO
