global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nacos'
    static_configs:
      - targets: ['nacos:9848']

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:8081']

  - job_name: 'gateway-service'
    static_configs:
      - targets: ['gateway-service:8080']
