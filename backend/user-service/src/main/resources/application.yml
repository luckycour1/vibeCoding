server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://${SPRING_DATASOURCE_URL:mysql:3306/vibecoding}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP-SERVERS:kafka:29092}
    consumer:
      group-id: user-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

spring.cloud.nacos:
  discovery:
    server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR:nacos:8848}
    namespace: dev
  config:
    server-addr: ${SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR:nacos:8848}
    file-extension: yaml

jwt:
  secret: ${JWT_SECRET:vibecoding-secret-key-for-jwt-token-generation}
  expiration: ${JWT_EXPIRATION:7200000}

logging:
  file:
    name: ${LOGGING_FILE_NAME:/logs/user-service.log}
  level:
    com.vibecoding: DEBUG
    org.springframework.cloud: INFO
