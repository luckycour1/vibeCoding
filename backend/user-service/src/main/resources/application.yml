server:
  port: 8081

spring:
  config:
    import: optional:nacos:${spring.application.name}.yaml
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://mysql:3306/vibecoding?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  redis:
    host: redis
    port: 6379
    password: 
  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: user-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
        namespace: dev
      config:
        server-addr: nacos:8848
        file-extension: yaml

jwt:
  secret: vibecoding-secret-key-for-jwt-token-generation
  expiration: 7200000

logging:
  file:
    name: /logs/user-service.log
  level:
    com.vibecoding: DEBUG
    org.springframework.cloud: INFO
