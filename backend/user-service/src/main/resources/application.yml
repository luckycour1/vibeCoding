server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/vibecoding?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  redis:
    host: localhost
    port: 6379
    password:
    database: 0

spring.cloud.nacos:
  discovery:
    server-addr: localhost:8848
    namespace: dev
  config:
    server-addr: localhost:8848
    file-extension: yaml

jwt:
  secret: vibecoding-secret-key-for-jwt-token-generation
  expiration: 7200000
