version: '3.8'

services:
  # Nacos 服务注册与配置中心
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: nacos
    restart: unless-stopped
    environment:
      - MODE=standalone
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - spring-cloud-net
    profiles: [infra]
    volumes:
      - /mnt/e/workApp/nacos/logs:/home/nacos/logs

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - spring-cloud-net
    profiles: [infra]

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - spring-cloud-net
    profiles: [infra]

  # Redis
  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - spring-cloud-net
    profiles: [infra]

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - /mnt/e/workApp/all-logs/prometheus:/prometheus
    ports:
      - "9090:9090"
    networks:
      - spring-cloud-net
    profiles: [infra]

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - loki
    networks:
      - spring-cloud-net
    profiles: [infra]
    volumes:
      - /mnt/e/workApp/grafana:/var/lib/grafana

  # Loki
  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - spring-cloud-net
    profiles: [infra]
    volumes:
      - /mnt/e/workApp/loki:/loki

  # Promtail
  promtail:
    image: grafana/promtail:2.9.2
    container_name: promtail
    restart: always
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - /mnt/e/workApp/all-logs:/var/log/spring-cloud
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - spring-cloud-net
    profiles: [infra]

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
    depends_on:
      - kafka
      - zookeeper
    networks:
      - spring-cloud-net
    profiles: [infra]

  # 网关服务
  gateway-service:
    build:
      context: ./gateway-service
      no_cache: true
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR=nacos:8848
      - LOGGING_FILE_NAME=/logs/gateway-service.log
    volumes:
      - /mnt/e/workApp/all-logs/gateway:/logs
    networks:
      - spring-cloud-net
    depends_on:
      - nacos
    profiles: [business]

  # 用户服务
  user-service:
    build:
      context: ./user-service
      no_cache: true
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR=nacos:8848
      - SPRING_KAFKA_BOOTSTRAP-SERVERS=kafka:29092
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/vibecoding?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - LOGGING_FILE_NAME=/logs/user-service.log
    volumes:
      - /mnt/e/workApp/all-logs/user:/logs
    networks:
      - spring-cloud-net
    depends_on:
      - nacos
      - redis
      - mysql
    profiles: [business]

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vibecoding
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - spring-cloud-net
    profiles: [infra]

networks:
  spring-cloud-net:
    name: spring-cloud-net
    driver: bridge

volumes:
  mysql-data:
