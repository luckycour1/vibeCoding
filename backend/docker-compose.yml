version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: vibecoding-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vibecoding
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - vibecoding-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:latest
    container_name: vibecoding-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - vibecoding-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nacos服务注册与配置中心
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: vibecoding-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vibecoding-network
    volumes:
      - nacos-logs:/home/nacos/logs

  # RabbitMQ消息队列 (使用Kafka替代)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: vibecoding-kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    networks:
      - vibecoding-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: vibecoding-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - vibecoding-network

  # Kafka UI (可选)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: vibecoding-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8989:8080"
    depends_on:
      - kafka
      - zookeeper
    networks:
      - vibecoding-network

  # 监控 (可选)
  prometheus:
    image: prom/prometheus:latest
    container_name: vibecoding-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - vibecoding-network

  grafana:
    image: grafana/grafana:latest
    container_name: vibecoding-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - vibecoding-network

volumes:
  mysql-data:
  redis-data:
  nacos-logs:
  grafana-data:

networks:
  vibecoding-network:
    driver: bridge
